version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - errcheck
        path: examples/

formatters:
  enable:
    - gofmt
    - goimports
